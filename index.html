<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nintendo Music Playlists | Discover Iconic Soundtracks</title>
    <meta name="description" content="A collection of my own and other people's playlists made in the Nintendo Music app. Enjoy curated Nintendo soundtracks from a variety of games!">
    <meta name="keywords" content="Nintendo Music, playlists, Nintendo Music app, Animal Crossing, Splatoon, video game music, Switch theme">
    <meta name="author" content="CodyMKW">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Nintendo Music Playlists | Discover Iconic Soundtracks">
    <meta property="og:description" content="A collection of my own and other people's playlists made in the Nintendo Music app. Enjoy curated Nintendo soundtracks from a variety of games!">
    <meta property="og:image" content="https://files.catbox.moe/zm8wdh.jpg">
    <meta property="og:url" content="https://codymkw.github.io/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Nintendo Music Playlists">
    <meta property="og:locale" content="en_US">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Nintendo Music Playlists | Discover Iconic Soundtracks">
    <meta name="twitter:description" content="A collection of my own and other people's playlists made in the Nintendo Music app. Enjoy curated Nintendo soundtracks from a variety of games!">
    <meta name="twitter:image" content="https://files.catbox.moe/zm8wdh.jpg">
    <meta name="twitter:site" content="@CodyMKW">
    <link rel="icon" href="https://files.catbox.moe/zm8wdh.jpg" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://files.catbox.moe/zm8wdh.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <header class="header">
            <div class="logo-container">
                <img src="https://files.catbox.moe/zm8wdh.jpg" alt="Nintendo Music Logo" class="site-logo">
            </div>
            <h1 class="page-title">Nintendo Music Playlists</h1>
            <p class="page-description">Curated Nintendo soundtracks from the Nintendo Music app</p>
        </header>

        <div class="controls-bar">
            <input type="text" id="search-bar" placeholder="Search playlists or tags..." oninput="filterPlaylists()">
            <select id="sort-options" onchange="sortPlaylists()">
                <option value="">Sort by...</option>
                <option value="alphabetical">A - Z</option>
                <option value="reverse-alphabetical">Z - A</option>
                <option value="creator">Creator (A-Z)</option>
                <option value="creator-reverse">Creator (Z-A)</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
                <option value="featured">Featured First</option>
            </select>
        </div>

        <section class="featured-section">
            <h2 class="section-title">Featured Playlists</h2>
            <div id="featured-playlist-container" class="playlist-grid featured-grid"></div>
        </section>

        <div class="submit-section">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLScpORLhv_0xbawrnCPQmMRB8OlJR6cHkf7_zav-JStIycPMlQ/viewform" target="_blank" class="submit-button">
                Submit Your Playlist
            </a>
        </div>

        <section class="all-section">
            <h2 class="section-title">All Playlists</h2>
            <div id="loading" class="loading">Loading playlists...</div>
            <div id="playlist-container" class="playlist-grid"></div>
            <div id="error-message" class="error-message"></div>
        </section>

        <div class="app-note">
            <p>You must have the <strong>Nintendo Music</strong> app installed to open playlists.</p>
            <div class="app-links">
                <a href="https://apps.apple.com/us/app/nintendo-music/id6466376604" target="_blank" class="app-button">iOS App</a>
                <a href="https://play.google.com/store/apps/details?id=com.nintendo.znba" target="_blank" class="app-button">Android App</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
